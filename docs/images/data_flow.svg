<svg viewBox="0 0 1100 780" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#7c8296"/>
    </marker>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1100" height="780" fill="#12161f"/>
  <text x="550" y="42" text-anchor="middle" fill="#f4f6fb" font-size="24" font-weight="700">ETL Pipeline — Load &amp; Transform Flow</text>

  <!-- Row 1: CSV sources -->
  <g filter="url(#shadow2)">
    <rect x="60" y="80" width="220" height="70" rx="10" fill="#2e3650" stroke="#4b5471"/>
    <rect x="320" y="80" width="220" height="70" rx="10" fill="#2e3650" stroke="#4b5471"/>
    <rect x="580" y="80" width="220" height="70" rx="10" fill="#2e3650" stroke="#4b5471"/>
    <rect x="840" y="80" width="200" height="70" rx="10" fill="#2e3650" stroke="#4b5471"/>
  </g>
  <text x="170" y="110" text-anchor="middle" fill="#e6e9f2" font-size="12" font-weight="700">cust_info.csv</text>
  <text x="170" y="128" text-anchor="middle" fill="#9aa2b8" font-size="10">source_crm</text>
  <text x="430" y="110" text-anchor="middle" fill="#e6e9f2" font-size="12" font-weight="700">prd_info.csv</text>
  <text x="430" y="128" text-anchor="middle" fill="#9aa2b8" font-size="10">source_crm</text>
  <text x="690" y="110" text-anchor="middle" fill="#e6e9f2" font-size="12" font-weight="700">sales_details.csv</text>
  <text x="690" y="128" text-anchor="middle" fill="#9aa2b8" font-size="10">source_crm</text>
  <text x="940" y="110" text-anchor="middle" fill="#e6e9f2" font-size="12" font-weight="700">LOC / CUST / PX_CAT</text>
  <text x="940" y="128" text-anchor="middle" fill="#9aa2b8" font-size="10">source_erp</text>

  <line x1="170" y1="150" x2="500" y2="200" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="430" y1="150" x2="510" y2="200" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="690" y1="150" x2="560" y2="200" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="940" y1="150" x2="620" y2="200" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>

  <!-- Bronze proc -->
  <g filter="url(#shadow2)">
    <rect x="330" y="205" width="440" height="60" rx="10" fill="#8a4a1c"/>
  </g>
  <text x="550" y="230" text-anchor="middle" fill="#fff3e6" font-size="14" font-weight="700">bronze.load_bronze()</text>
  <text x="550" y="250" text-anchor="middle" fill="#ffe0bf" font-size="10.5">TRUNCATE + COPY ... CSV HEADER  (per table, timed &amp; logged)</text>

  <line x1="550" y1="265" x2="550" y2="305" stroke="#7c8296" stroke-width="1.8" marker-end="url(#arrow2)"/>

  <!-- Bronze tables -->
  <g filter="url(#shadow2)">
    <rect x="230" y="310" width="640" height="60" rx="10" fill="#cd7f32"/>
  </g>
  <text x="550" y="335" text-anchor="middle" fill="#2a1608" font-size="13" font-weight="800">BRONZE TABLES (raw, 1:1 with source files)</text>
  <text x="550" y="355" text-anchor="middle" fill="#3d2410" font-size="10.5">crm_cust_info · crm_prd_info · crm_sales_details · erp_loc_a101 · erp_cust_az12 · erp_px_cat_g1v2</text>

  <line x1="550" y1="370" x2="550" y2="400" stroke="#7c8296" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <text x="640" y="392" fill="#8892a6" font-size="10" font-style="italic">quality checks (tests/testsForBronzebeforeSilver.sql)</text>

  <!-- Silver proc -->
  <g filter="url(#shadow2)">
    <rect x="230" y="405" width="640" height="90" rx="10" fill="#8f909a"/>
  </g>
  <text x="550" y="430" text-anchor="middle" fill="#22242c" font-size="14" font-weight="700">silver.load_silver()</text>
  <text x="550" y="450" text-anchor="middle" fill="#2c2e37" font-size="10.5">TRIM names · standardize marital status / gender / country codes</text>
  <text x="550" y="466" text-anchor="middle" fill="#2c2e37" font-size="10.5">de-duplicate via ROW_NUMBER() · derive cat_id &amp; prd_end_dt · validate &amp; recompute dates / sales</text>
  <text x="550" y="482" text-anchor="middle" fill="#2c2e37" font-size="10.5">stamp dwh_create_date</text>

  <line x1="550" y1="495" x2="550" y2="525" stroke="#7c8296" stroke-width="1.8" marker-end="url(#arrow2)"/>

  <!-- Silver tables -->
  <g filter="url(#shadow2)">
    <rect x="230" y="530" width="640" height="55" rx="10" fill="#d9d9e3"/>
  </g>
  <text x="550" y="553" text-anchor="middle" fill="#22242c" font-size="13" font-weight="800">SILVER TABLES (cleansed, conformed, audit-stamped)</text>
  <text x="550" y="572" text-anchor="middle" fill="#3a3c46" font-size="10.5">Same table set as Bronze + dwh_create_date column</text>

  <line x1="550" y1="585" x2="550" y2="615" stroke="#7c8296" stroke-width="1.8" marker-end="url(#arrow2)"/>

  <!-- Gold views -->
  <g filter="url(#shadow2)">
    <rect x="120" y="620" width="270" height="70" rx="10" fill="#ffd66b"/>
    <rect x="415" y="620" width="270" height="70" rx="10" fill="#ffd66b"/>
    <rect x="270" y="700" width="270" height="70" rx="10" fill="#ffcf4d" stroke="#c99400" stroke-width="1.5"/>
  </g>
  <text x="255" y="650" text-anchor="middle" fill="#3d2c02" font-size="13" font-weight="700">gold.dim_customers</text>
  <text x="255" y="668" text-anchor="middle" fill="#4a3603" font-size="10">CRM cust ⋈ ERP cust ⋈ ERP loc</text>
  <text x="550" y="650" text-anchor="middle" fill="#3d2c02" font-size="13" font-weight="700">gold.dim_products</text>
  <text x="550" y="668" text-anchor="middle" fill="#4a3603" font-size="10">CRM prd ⋈ ERP px_cat (current only)</text>
  <text x="405" y="730" text-anchor="middle" fill="#3d2c02" font-size="13" font-weight="700">gold.fact_sales</text>
  <text x="405" y="748" text-anchor="middle" fill="#4a3603" font-size="10">sales_details ⋈ dim_products ⋈ dim_customers</text>

  <line x1="255" y1="590" x2="255" y2="618" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="550" y1="590" x2="550" y2="618" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="255" y1="690" x2="360" y2="700" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>
  <line x1="550" y1="690" x2="450" y2="700" stroke="#7c8296" stroke-width="1.6" marker-end="url(#arrow2)"/>

  <text x="850" y="655" fill="#8892a6" font-size="10.5" font-style="italic">gold layer is a set of</text>
  <text x="850" y="670" fill="#8892a6" font-size="10.5" font-style="italic">plain SQL VIEWs, defined</text>
  <text x="850" y="685" fill="#8892a6" font-size="10.5" font-style="italic">in ddl_gold.sql —</text>
  <text x="850" y="700" fill="#8892a6" font-size="10.5" font-style="italic">no physical materialization</text>

  <text x="270" y="762" fill="#4a3603" font-size="9.5" font-style="italic" text-anchor="start">validated by tests/testForGOLD.sql (surrogate-key duplicates + orphan facts)</text>
</svg>
